<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yobee — AI Operations Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --yobee-dark: #070E1A;
    --yobee-dark2: #0D1A2E;
    --yobee-accent: #1D9E75;
    --yobee-accent-light: #5DCAA5;
    --yobee-muted: rgba(255,255,255,0.35);
    --yobee-border: rgba(255,255,255,0.08);
    --yobee-card: rgba(255,255,255,0.04);
    --yobee-card-hover: rgba(255,255,255,0.07);
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--yobee-dark);
    color: #fff;
    font-family: var(--font);
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(29,158,117,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(29,158,117,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 2.5rem;
    border-bottom: 1px solid var(--yobee-border);
    margin-bottom: 2.5rem;
  }

  .logo-block { display: flex; flex-direction: column; gap: 4px; }

  .logo-name {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: #fff;
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--yobee-accent-light);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid var(--yobee-border);
    color: var(--yobee-muted);
    letter-spacing: 0.06em;
  }

  .pill.live {
    border-color: rgba(29,158,117,0.4);
    color: var(--yobee-accent-light);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .pill.live::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--yobee-accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--yobee-muted);
    margin-bottom: 1rem;
  }

  .workflow-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 2rem;
  }

  .wf-card {
    background: var(--yobee-card);
    border: 1px solid var(--yobee-border);
    border-radius: 12px;
    padding: 1.25rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .wf-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--yobee-accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
  }

  .wf-card:hover {
    background: var(--yobee-card-hover);
    border-color: rgba(255,255,255,0.14);
    transform: translateY(-1px);
  }

  .wf-card:hover::after { transform: scaleX(1); }

  .wf-card.active {
    background: rgba(29,158,117,0.08);
    border-color: rgba(29,158,117,0.4);
  }

  .wf-card.active::after { transform: scaleX(1); }

  .wf-number {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--yobee-accent);
    margin-bottom: 10px;
    letter-spacing: 0.08em;
  }

  .wf-title {
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 5px;
    line-height: 1.3;
  }

  .wf-desc {
    font-size: 11px;
    color: var(--yobee-muted);
    line-height: 1.5;
  }

  .wf-team {
    display: inline-block;
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 99px;
    background: rgba(29,158,117,0.12);
    color: var(--yobee-accent-light);
    border: 1px solid rgba(29,158,117,0.2);
  }

  .form-panel {
    background: var(--yobee-card);
    border: 1px solid var(--yobee-border);
    border-radius: 16px;
    overflow: hidden;
    display: none;
  }

  .form-panel.visible { display: block; animation: slideIn 0.2s ease; }

  @keyframes slideIn
